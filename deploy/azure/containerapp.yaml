location: <azure-region>
name: <container-app-name>
properties:
  managedEnvironmentId: <managed-environment-resource-id>
  configuration:
    ingress:
      external: true
      targetPort: 4000
      transport: auto
    registries:
      - server: <ACR_NAME>.azurecr.io
        username: <ACR_USERNAME>
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: <ACR_PASSWORD>
      - name: admin-password
        value: <ADMIN_PASSWORD>
      - name: admin-token-secret
        value: <ADMIN_TOKEN_SECRET>
  template:
    containers:
      - image: <ACR_NAME>.azurecr.io/ifl-fullstack:latest
        name: ifl-app
        env:
          - name: PORT
            value: "4000"
          - name: DATABASE_URL
            value: sqlite:////app/data/ifl.sqlite3
          - name: ADMIN_USERNAME
            value: admin
          - name: ADMIN_PASSWORD
            secretRef: admin-password
          - name: ADMIN_TOKEN_SECRET
            secretRef: admin-token-secret
        volumeMounts:
          - volumeName: sqlite-data
            mountPath: /app/data
        resources:
          cpu: 0.5
          memory: 1Gi
    volumes:
      - name: sqlite-data
        storageType: AzureFile
        storageName: <environment-storage-name>
    scale:
      minReplicas: 1
      maxReplicas: 1
